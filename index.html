<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ライフアプリ</title>

<style>
body{
  margin:0;
  background:#18181a;
  color:#fff;
  font-family:-apple-system;
  padding:20px;
}

h1{
  font-size:28px;
  margin-bottom:10px;
}

.tabs{
  display:flex;
  gap:8px;
  margin-bottom:15px;
}

.tab{
  flex:1;
  text-align:center;
  padding:10px;
  border-radius:10px;
  background:#2a2a2d;
}

.active{
  background:#4d7dff;
}

input, textarea{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#333;
  color:#fff;
  box-sizing:border-box;
  margin-bottom:10px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#4d7dff;
  color:#fff;
}

.item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  background:#222;
  transition:0.2s;
}

.item:active{
  transform:scale(0.98);
  opacity:0.8;
}

.done{
  opacity:0.4;
  text-decoration:line-through;
}

.del{
  background:#ff4d4d;
  border:none;
  color:#fff;
  border-radius:8px;
  padding:6px 10px;
}
.hidden{display:none;}
</style>
</head>

<body>

<h1>ライフアプリ</h1>

<div class="tabs">
  <div class="tab active" onclick="sw('todo')">タスク</div>
  <div class="tab" onclick="sw('diary')">日記</div>
  <div class="tab" onclick="sw('cal')">カレンダー</div>
</div>

<!-- タスク -->
<div id="todo">
  <input id="t" placeholder="新しいタスク">
  <button onclick="add()">追加</button>
  <div id="list"></div>
</div>

<!-- 日記 -->
<div id="diary" class="hidden">
  <textarea id="d" rows="6" placeholder="日記を書く..."></textarea>
  <button onclick="saveDiary()">保存</button>
  <div id="dview"></div>
</div>

<!-- カレンダー -->
<div id="cal" class="hidden">
  <input type="date" id="date">
  <textarea id="note" rows="4" placeholder="予定を書く..."></textarea>
  <button onclick="saveCal()">保存</button>
  <div id="cview"></div>
</div>

<script>
let tasks = JSON.parse(localStorage.t || "[]");
let diary = localStorage.d || "";
let cal = JSON.parse(localStorage.c || "{}");

/* 保存 */
function save(){
  localStorage.t = JSON.stringify(tasks);
  localStorage.d = diary;
  localStorage.c = JSON.stringify(cal);
}

/* タブ切り替え */
function sw(x){
  document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active'));
  event.target.classList.add('active');

  ['todo','diary','cal'].forEach(i=>{
    document.getElementById(i).classList.add('hidden');
  });
  document.getElementById(x).classList.remove('hidden');
}

/* タスク */
function draw(){
  let l = document.getElementById("list");
  l.innerHTML="";
  tasks.forEach((t,i)=>{
    l.innerHTML+=`
      <div class="item">
        <span onclick="toggle(${i})" class="${t.c?'done':''}">
          ${t.t}
        </span>
        <button class="del" onclick="del(${i})">×</button>
      </div>`;
  });
}

function add(){
  if(!t.value) return;
  tasks.push({t:t.value,c:false});
  t.value="";
  save();
  draw();
}

function toggle(i){
  tasks[i].c=!tasks[i].c;
  save();
  draw();
}

function del(i){
  tasks.splice(i,1);
  save();
  draw();
}

/* 日記 */
function saveDiary(){
  diary = d.value;
  save();
}

/* カレンダー */
function saveCal(){
  if(!date.value) return;
  cal[date.value]=note.value;
  note.value="";
  save();
  renderCal();
}

function renderCal(){
  let c = document.getElementById("cview");
  c.innerHTML="";
  for(let k in cal){
    c.innerHTML += `<div class="item"><b>${k}</b>：${cal[k]}</div>`;
  }
}

draw();
d.value = diary;
renderCal();
</script>

</body>
</html>
