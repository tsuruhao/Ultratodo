<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Ultra Todo</title>

<style>
body{
  margin:0;
  background:#18181a;
  color:#fff;
  font-family:-apple-system;
  padding:24px;
}

h1{
  font-size:34px;
  margin-bottom:16px;
}

input{
  width:100%;
  padding:16px;
  font-size:16px;
  border:none;
  border-radius:16px;
  background:#333;
  color:#fff;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:16px;
  margin-top:10px;
  font-size:18px;
  border:none;
  border-radius:16px;
  background:#4d7dff;
  color:#fff;
}

.task{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  background:#222;
}

.task span{
  flex:1;
}

.done{
  text-decoration:line-through;
  opacity:0.5;
}

.del{
  background:#ff4d4d;
  border:none;
  color:#fff;
  border-radius:8px;
  padding:6px 10px;
}
</style>

</head>

<body>

<h1>Ultra Todo</h1>

<input id="t" placeholder="New Task">

<button onclick="add()">Add</button>

<div id="l"></div>

<script>
let a = JSON.parse(localStorage.getItem("todo") || "[]");

function save(){
  localStorage.setItem("todo", JSON.stringify(a));
}

function draw(){
  let l = document.getElementById("l");
  l.innerHTML = "";

  a.forEach((item, i) => {
    l.innerHTML += `
      <div class="task">
        <span onclick="toggle(${i})" class="${item.c ? 'done' : ''}">
          ${item.t}
        </span>
        <button class="del" onclick="del(${i})">×</button>
      </div>
    `;
  });
}

function add(){
  let t = document.getElementById("t");
  if(t.value.trim() === "") return;

  a.push({t: t.value, c: false});
  t.value = "";

  save();
  draw();
}

function toggle(i){
  a[i].c = !a[i].c;
  save();
  draw();
}

function del(i){
  a.splice(i,1);
  save();
  draw();
}

draw();
</script>

</body>
</html>
